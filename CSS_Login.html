<style>

.login-box{
  width:350px;
  margin:120px auto;
  background:white;
  padding:25px;
  border-radius:10px;
  box-shadow:0 0 10px rgba(0,0,0,.1);
  text-align:center;
  opacity:0;
  transform:translateY(25px);
  animation: fadeInUp 0.7s ease forwards;
}

.login-box.loading{
  animation: none;
}

.logo{
  width:100px;
  height:auto;
  display:block;
  margin:0 auto 10px;
  margin-bottom:10px;
}

.login-button{
  width:100%;
  padding:10px;
  box-sizing:border-box;
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
  position:relative;
  overflow:hidden;
  transition:background .3s ease, transform .3s ease;
}

.login-button:disabled {
  opacity:0.7;
  cursor:not-allowed;
}

.login-button .button-text {
  display:inline-block;
  transition:opacity .2s ease;
}

.login-button .button-loader {
  position:absolute;
  left:50%;
  top:50%;
  width:18px;
  height:18px;
  margin:-9px 0 0 -9px;
  border:2px solid rgba(255,255,255,0.7);
  border-top-color:#fff;
  border-radius:50%;
  opacity:0;
  transform:scale(0.5);
  transition:opacity .2s ease, transform .2s ease;
}

.login-button .button-loader.active {
  opacity:1;
  transform:scale(1);
  animation: spin 0.8s linear infinite;
}

.login-box.loading .login-button {
  background:#0b5ed7;
}

.login-box.loading .button-text {
  opacity:0.3;
}

@keyframes fadeInUp {
  to {
    opacity:1;
    transform:translateY(0);
  }
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

.subtitle{
  margin:0 0 20px 0;
  color:#777;
  font-size:9px;
  line-height:1;
}

input{
  width:100%;
  padding:10px;
  margin-bottom:10px;
  box-sizing:border-box;
  border:1px solid #ccc;
  border-radius:5px;
}

button{
  width:100%;
  padding:10px;
  box-sizing:border-box;
  background:#0d6efd;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

</style>
