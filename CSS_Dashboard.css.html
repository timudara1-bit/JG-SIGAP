<style>

/* =========================
   SECTION
========================= */

.dashboard-section{
    margin-top:25px;
    margin-left:20px;
    margin-bottom:25px;
}

.dashboard-section h2{
    margin:0 0 15px 0;
    text-align:center;
    color:#003366;
}

/* =========================
   ROW CARD
========================= */

.dashboard-row{
    display:flex;
    flex-wrap:nowrap;      /* paksa 1 baris */
    gap:15px;
    overflow-x:auto;       /* scroll horizontal */
    padding-bottom:10px;
}

/* Scrollbar */

.dashboard-row::-webkit-scrollbar{
    height:8px;
}

.dashboard-row::-webkit-scrollbar-thumb{
    background:#c0c0c0;
    border-radius:10px;
}

/* =========================
   CARD
========================= */

.dashboard_card{
    flex:0 0 260px;        /* lebar tetap */
    background:#fff;
    padding:20px;
    border-radius:10px;
    box-shadow:0 2px 8px rgba(0,0,0,.08);
}

.dashboard_card h3{
    margin:0 0 15px 0;
    text-align:center;
    color:#333;
    font-size:16px;
}

/* =========================
   ITEM
========================= */

.dashboard_item{
    display:grid;
    grid-template-columns:120px 10px 1fr;
    gap:5px;
    padding:6px 8px;
    cursor:pointer;
    transition:0.2s;
}

.dashboard_item:hover{
    background:#f5f5f5;
    border-radius:5px;
}

.label{
    text-align:left;
}

.separator{
    text-align:center;
}

.value{
    text-align:right;
    font-weight:bold;
    color:#003366;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:768px){

    .dashboard_card{
        flex:0 0 240px;
    }

}




</style>
