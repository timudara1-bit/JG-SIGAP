<style>
/* =========================
   PAGE
========================= */

.page-title{
  margin-bottom:20px;
}

.page-title h2{
  margin:0;
  font-size:24px;
  font-weight:600;
  color:#1f2937;
}

/* =========================
   CARD
========================= */

.fpb-card{
  background:#fff;

  border:1px solid #e5e7eb;

  border-radius:12px;

  padding:20px;

  margin-bottom:20px;

  box-shadow:
    0 2px 8px rgba(0,0,0,.04);
}

/* =========================
   TOOLBAR
========================= */

.toolbar{
  display:flex;
  justify-content:space-between;
  align-items:center;

  margin-bottom:20px;
}

.toolbar-left,
.toolbar-right{
  display:flex;
  gap:10px;
}

/* =========================
   BUTTON
========================= */

.btn{
  border:none;
  border-radius:8px;

  padding:10px 16px;

  cursor:pointer;

  font-size:13px;
  font-weight:600;

  transition:.2s;
}

.btn-primary{
  background:#2563eb;
  color:white;
}

.btn-primary:hover{
  background:#1d4ed8;
}

.btn-success{
  background:#16a34a;
  color:white;
}

.btn-success:hover{
  background:#15803d;
}

.btn-warning{
  background:#f59e0b;
  color:white;
}

.btn-warning:hover{
  background:#d97706;
}

.btn-danger{
  background:#dc2626;
  color:white;
}

.btn-danger:hover{
  background:#b91c1c;
}

.btn-secondary{
  background:#6b7280;
  color:white;
}

/* =========================
   FORM GRID
========================= */

.form-grid{
  display:grid;

  grid-template-columns:
    repeat(4,1fr);

  gap:15px;
}

.form-group{
  display:flex;
  flex-direction:column;
}

.form-group label{
  font-size:12px;
  font-weight:600;

  color:#4b5563;

  margin-bottom:6px;
}

.form-group input,
.form-group select,
.form-group textarea{

  border:1px solid #d1d5db;

  border-radius:8px;

  padding:10px;

  font-size:13px;

  transition:.2s;
}

.form-group input:focus,
.form-group select:focus,
.form-group textarea:focus{

  outline:none;

  border-color:#2563eb;

  box-shadow:
    0 0 0 3px rgba(37,99,235,.15);
}

/* =========================
   TABLE
========================= */

.item-table{
  width:100%;
  border-collapse:collapse;
}

.item-table thead{
  background:#f3f4f6;
}

.item-table th{

  padding:12px;

  border:1px solid #e5e7eb;

  font-size:12px;

  text-transform:uppercase;

  color:#374151;
}

.item-table td{

  border:1px solid #e5e7eb;

  padding:8px;
}

.item-table input,
.item-table select{

  width:100%;

  border:none;

  padding:6px;
}

.item-table input:focus,
.item-table select:focus{

  outline:none;
}

/* =========================
   UPLOAD AREA
========================= */

.upload-box{

  border:2px dashed #cbd5e1;

  border-radius:10px;

  padding:20px;

  text-align:center;

  background:#f8fafc;
}

.upload-box:hover{

  border-color:#2563eb;
}

.upload-title{

  font-weight:600;

  color:#374151;

  margin-bottom:10px;
}

/* =========================
   APPROVAL FLOW
========================= */

.approval-flow{

  display:flex;

  gap:15px;

  flex-wrap:wrap;
}

.approval-step{

  padding:10px 18px;

  border-radius:30px;

  font-size:12px;

  font-weight:600;
}

.approved{

  background:#dcfce7;
  color:#166534;
}

.pending{

  background:#fef3c7;
  color:#92400e;
}

.rejected{

  background:#fee2e2;
  color:#991b1b;
}

.waiting{

  background:#e5e7eb;
  color:#4b5563;
}

/* =========================
   PROGRESS BAR
========================= */

.progress{

  width:100%;
  height:12px;

  background:#e5e7eb;

  border-radius:20px;

  overflow:hidden;

  margin-top:10px;
}

.progress-bar{

  height:100%;

  width:75%;

  background:#16a34a;
}

/* =========================
   ACTION BAR
========================= */

.action-bar{

  display:flex;

  justify-content:flex-end;

  gap:10px;

  margin-top:20px;
}

/* =========================
   SEARCH BOX
========================= */

.search-box{

  display:flex;

  gap:10px;

  margin-bottom:15px;
}

.search-box input{

  flex:1;
}

/* =========================
   RESPONSIVE
========================= */

@media(max-width:1200px){

  .form-grid{

    grid-template-columns:
      repeat(2,1fr);

  }

}

@media(max-width:768px){

  .form-grid{

    grid-template-columns:1fr;

  }

  .toolbar{

    flex-direction:column;

    align-items:stretch;

    gap:10px;
  }

  .action-bar{

    flex-direction:column;
  }

}

.section-header{

  background:#1f2937;

  color:white;

  padding:12px 15px;

  margin:-20px -20px 20px -20px;

  border-radius:
    12px 12px 0 0;

  font-size:14px;

  font-weight:600;

  letter-spacing:.5px;
}


</style>
