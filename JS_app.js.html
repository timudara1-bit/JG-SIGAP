<script>

  function loadPage(page) {    

    google.script.run
      .withSuccessHandler(function(html){

        document.getElementById(
          "content"
        ).innerHTML = html;

        if (page === "dashboard") {          

          // loadSLADashboard();     // SLA engine baru
          initDashboard();        // partial HTML load
          loadDashboard();        // existing KPI          

        }

        if (typeof applyRolePermissions === 'function') {
          applyRolePermissions();
        }

      })
    .getPage(page);

  }

  window.addEventListener("click", function(e){

    const menu =
      document.querySelector(".profile-menu");

    if(!menu.contains(e.target)){

      document
        .getElementById("profileDropdown")
        .classList
        .remove("show");

    }

  });


  
  function logout() {
    const confirmLogout = typeof Swal !== 'undefined';

    const proceed = () => {
      google.script.run
        .withSuccessHandler(function() {
          const baseUrl = window.top.location.href.split("?")[0];
          window.top.location.replace(baseUrl + "?page=login&_=" + Date.now());
        })
        .withFailureHandler(function(err) {
          console.error(err);
          alert(err.message);
        })
        .logoutUser();
    };

    if (confirmLogout) {
      Swal.fire({
        title: "Logout ?",
        text: "Apakah Anda yakin ingin keluar?",
        icon: "warning",
        showCancelButton: true,
        confirmButtonText: "Ya",
        cancelButtonText: "Tidak",
        reverseButtons: true
      }).then((result) => {
        if (result.isConfirmed) {
          proceed();
        }
      });
    } else {
      if (window.confirm("Apakah Anda yakin ingin keluar?")) {
        proceed();
      }
    }
  }

function loadLoaderMenu(){

  google.script.run
    .withSuccessHandler(renderLoaderMenu)
    .getAccessibleLoaders();

}

function renderLoaderMenu(loaders){

  const menu =
    document.getElementById("loaderMenu");

  if(!menu) return;

  let html = "";

  loaders.forEach(loader => {

    const loaderCode = loader[0];
    const loaderName = loader[1];
    const moduleCode = loader[2];

    html += `
      <li>
        <a href="#"
           onclick="openLoader('${moduleCode}')">

          📤 ${loaderName}

        </a>
      </li>
    `;

  });

  menu.innerHTML = html;

}

function loadSidebarMenu(roleCode) {
  if (!roleCode) return;

  google.script.run
    .withSuccessHandler(function(items) {
      const menu = document.getElementById("sidebarMenu");
      if (!menu) return;

      if (!Array.isArray(items) || items.length === 0) {
        menu.innerHTML = '<li>Tidak ada menu tersedia</li>';
        return;
      }

      let html = "";
      items.forEach(item => {
        const page = item.page || "";
        const label = item.label || page;
        const icon = item.icon || "";
        html += `
          <li>
            <a href="#" onclick="loadPage('${page}'); return false;">
              ${icon}${label}
            </a>
          </li>
        `;
      });

      menu.innerHTML = html;
    })
    .withFailureHandler(function(err) {
      console.error("Unable to load sidebar menu", err);
    })
    .getRoleMenuItems(roleCode);
}

document.addEventListener(
  "DOMContentLoaded",
  function(){

    loadLoaderMenu();

  }
);


</script>
