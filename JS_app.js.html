<script>
console.log("JS_APP_LAYOUT_SHELL_PATCH_V1");

function getSessionToken() {
  return localStorage.getItem("JG_SIGAP_TOKEN") || "";
}

function getSessionUser() {
  try {
    return JSON.parse(localStorage.getItem("JG_SIGAP_USER") || "{}");
  } catch (err) {
    return {};
  }
}

function clearClientSession() {
  localStorage.removeItem("JG_SIGAP_TOKEN");
  localStorage.removeItem("JG_SIGAP_USER");
  localStorage.removeItem("JG_SIGAP_ROLE");
  localStorage.removeItem("JG_SIGAP_ROLES");
}

function setLayoutMode(mode) {
  if (mode === "public") {
    document.body.classList.add("public-page");
  } else {
    document.body.classList.remove("public-page");
  }
}

function updateNavbarUser(session) {
  const user = session || getSessionUser() || {};

  const name =
    user.full_name ||
    user.nama ||
    user.username ||
    user.email ||
    "User";

  const email = user.email || user.username || "";
  const role = user.role || user.role_code || localStorage.getItem("JG_SIGAP_ROLE") || "";

  const navbarUserName = document.getElementById("navbarUserName");
  const navbarUserRole = document.getElementById("navbarUserRole");
  const userName = document.getElementById("userName");
  const userEmail = document.getElementById("userEmail");
  const userPhoto = document.getElementById("userPhoto");

  if (navbarUserName) navbarUserName.textContent = name;
  if (navbarUserRole) navbarUserRole.textContent = role ? "(" + role + ")" : "";
  if (userName) userName.textContent = name;
  if (userEmail) userEmail.textContent = email;

  if (userPhoto) {
    userPhoto.src =
      "https://ui-avatars.com/api/?name=" +
      encodeURIComponent(name) +
      "&background=1f2937&color=ffffff";
  }

  document.body.classList.remove(
    "role-superadmin",
    "role-admin",
    "role-requester"
  );

  if (role) {
    document.body.classList.add("role-" + String(role).toLowerCase().replace(/_/g, "-"));
  }
}

function showPublicPage(page) {
  setLayoutMode("public");

  google.script.run
    .withSuccessHandler(function(html) {
      const content = document.getElementById("content");
      if (content) content.innerHTML = html;
    })
    .withFailureHandler(function(err) {
      console.error("PUBLIC PAGE ERROR", err);
      alert((err && err.message) ? err.message : err);
    })
    .getPublicPage(page || "login");
}

function loadPage(page) {
  const token = getSessionToken();

  if (!token) {
    showPublicPage("login");
    return;
  }

  setLayoutMode("private");

  google.script.run
    .withSuccessHandler(function(html) {
      const content = document.getElementById("content");

      if (!content) {
        alert("Container content tidak ditemukan");
        return;
      }

      content.innerHTML = html;
      setActiveMenu(page || "dashboard");
      runPageInitializer(page || "dashboard");
    })
    .withFailureHandler(function(err) {
      console.error("LOAD PAGE ERROR", err);
      alert((err && err.message) ? err.message : err);

      const msg = String((err && err.message) || err).toLowerCase();
      if (msg.includes("session")) {
        clearClientSession();
        showPublicPage("login");
      }
    })
    .getPage(page || "dashboard", token);
}

function setActiveMenu(page) {
  document.querySelectorAll(".sidebar-item").forEach(function(el) {
    el.classList.remove("active");

    const onclick = el.getAttribute("onclick") || "";
    if (onclick.includes("'" + page + "'") || onclick.includes('"' + page + '"')) {
      el.classList.add("active");
    }
  });
}

function runPageInitializer(page) {
  if (page === "dashboard") {
    if (typeof initDashboard === "function") initDashboard();
    if (typeof loadDashboard === "function") loadDashboard();
  }

  if (page === "user-management" && typeof loadUserManagement === "function") {
    loadUserManagement();
  }

  if (typeof applyRolePermissions === "function") {
    applyRolePermissions();
  }
}

function checkClientSessionAndLoadPage() {
  const token = getSessionToken();

  if (!token) {
    showPublicPage("login");
    return;
  }

  google.script.run
    .withSuccessHandler(function(res) {
      console.log("SESSION CHECK RESPONSE", res);

      if (!res || !res.success) {
        clearClientSession();
        showPublicPage("login");
        return;
      }

      const session = res.session || {};
      localStorage.setItem("JG_SIGAP_USER", JSON.stringify(session || {}));
      localStorage.setItem("JG_SIGAP_ROLE", session.role || session.role_code || "");

      updateNavbarUser(session);

      const role = session.role || session.role_code || "";
      if (typeof loadSidebarMenu === "function" && role) {
        loadSidebarMenu(role);
      }

      if (typeof loadLoaderMenu === "function") {
        loadLoaderMenu();
      }

      loadPage("dashboard");
    })
    .withFailureHandler(function(err) {
      console.error("SESSION VALIDATION ERROR", err);
      clearClientSession();
      showPublicPage("login");
    })
    .validateSessionToken(token);
}

function toggleProfileMenu() {
  const dropdown = document.getElementById("profileDropdown");
  if (dropdown) dropdown.classList.toggle("show");
}

window.addEventListener("click", function(e) {
  const menu = document.querySelector(".profile-menu");
  const dropdown = document.getElementById("profileDropdown");

  if (!menu || !dropdown) return;

  if (!menu.contains(e.target)) {
    dropdown.classList.remove("show");
  }
});

function logout() {
  const token = getSessionToken();

  const doLogout = function() {
    google.script.run
      .withSuccessHandler(function() {
        clearClientSession();
        showPublicPage("login");
      })
      .withFailureHandler(function(err) {
        console.error("LOGOUT ERROR", err);
        clearClientSession();
        showPublicPage("login");
      })
      .logoutUser(token);
  };

  if (window.confirm("Apakah Anda yakin ingin keluar?")) {
    doLogout();
  }
}

function loadLoaderMenu() {
  const token = getSessionToken();
  const menu = document.getElementById("loaderMenu");

  if (!menu) return;

  google.script.run
    .withSuccessHandler(function(loaders) {
      let html = "";

      (loaders || []).forEach(function(loader) {
        const loaderName = loader[1] || loader.loader_name || "Loader";
        const moduleCode = loader[2] || loader.module_code || "";

        html += `
          <li>
            <a href="#" class="sidebar-item" onclick="openLoader && openLoader('${moduleCode}'); return false;">
              📤 ${loaderName}
            </a>
          </li>
        `;
      });

      menu.innerHTML = html || `
        <li>
          <span class="sidebar-item muted">Tidak ada loader</span>
        </li>
      `;
    })
    .withFailureHandler(function(err) {
      console.error("Loader menu error", err);
      menu.innerHTML = `
        <li>
          <span class="sidebar-item muted">Loader gagal dimuat</span>
        </li>
      `;
    })
    .getAccessibleLoaders(token);
}

document.addEventListener("DOMContentLoaded", function() {
  const initial = window.INITIAL_DATA || {};
  const page = initial.page || "login";

  console.log("JG-SIGAP BOOT", {
    page: page,
    hasToken: !!getSessionToken()
  });

  if (page === "login" || page === "register") {
    if (getSessionToken()) {
      checkClientSessionAndLoadPage();
    } else {
      showPublicPage(page);
    }
    return;
  }

  checkClientSessionAndLoadPage();
});
</script>
