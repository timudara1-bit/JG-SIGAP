<div class="loader-container">

  <h2>Universal Data Loader</h2>

  <div class="form-group">

    <label>Module</label>

    <select id="loaderModule">

      <option value="">-- Pilih Module --</option>

      <option value="GA">Verifikasi GA</option>

      <option value="FAT">Verifikasi FAT</option>

      <option value="IA">Verifikasi IA</option>

      <option value="PP">Create PP</option>

      <option value="PR">Create PR</option>

      <option value="PO">Create PO</option>

      <option value="RECEIVE">Receive</option>

      <option value="INVOICE">Invoice</option>

      <option value="PAYMENT">Payment</option>

    </select>

  </div>

  <div class="form-group">

    <button onclick="downloadTemplate()">

      Download Template

    </button>

  </div>

  <div class="form-group">

    <input
      type="file"
      id="excelFile"
      accept=".xlsx,.xls,.csv"
      onchange="previewFile()">

  </div>

  <div class="form-group">

    <button onclick="uploadData()">

      Import Data

    </button>

  </div>

  <hr>

  <h3>Preview Data</h3>

  <div id="previewArea"></div>

</div>
