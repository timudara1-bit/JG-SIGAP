function submitFPB(){

  google.script.run

    .withSuccessHandler(function(){

      Swal.fire(
        'Success',
        'FPB berhasil disubmit',
        'success'
      );

    })

    .withFailureHandler(function(err){

      Swal.fire(
        'Error',
        err.message,
        'error'
      );

    })

    .submitFPBController(
      currentFPBId
    );

}

async function uploadQuotation(){

    const files =
      document
        .getElementById(
          "quotationFiles"
        ).files;

    for(const file of files){

      const reader =
        new FileReader();

      reader.onload = function(e){

        const base64 =
          e.target.result
          .split(",")[1];

        google.script.run
          .uploadQuotationController(
            currentFPBId,
            file.name,
            file.type,
            base64
          );

      };

      reader.readAsDataURL(file);

    }

  }
