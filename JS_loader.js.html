<script>
  let uploadedData = [];
function downloadTemplate(){

  const module =
    document.getElementById(
      "loaderModule"
    ).value;

  if(!module){

    alert(
      "Pilih module terlebih dahulu"
    );

    return;

  }

  google.script.run
  .withSuccessHandler(renderLoaderMenu)
  .getAccessibleLoaders();

  // google.script.run

  //   .withSuccessHandler(data => {

  //     console.log(data);

  //     alert(
  //       "Template berhasil dimuat"
  //     );

  //   })

  //   .getTemplate(module);

}

function previewFile(){

  const file =
    document.getElementById(
      "excelFile"
    ).files[0];

  if(!file) return;

  const reader =
    new FileReader();

  reader.onload = function(e){

    const text =
      e.target.result;

    uploadedData =
      text
        .split("\n")
        .map(
          row =>
          row.split(",")
        );

    renderPreview();

  };

  reader.readAsText(file);

}

function renderPreview(){

  let html =
    "<table class='preview-table'>";

  uploadedData.forEach(
    (row,index) => {

    html += "<tr>";

    row.forEach(cell => {

      html += index === 0

        ? "<th>"+cell+"</th>"

        : "<td>"+cell+"</td>";

    });

    html += "</tr>";

  });

  html += "</table>";

  document.getElementById(
    "previewArea"
  ).innerHTML = html;

}

function uploadData(){

  const module =
    document.getElementById(
      "loaderModule"
    ).value;

  if(!module){

    alert("Pilih module");

    return;

  }

  if(uploadedData.length === 0){

    alert(
      "Belum ada data"
    );

    return;

  }

  google.script.run

    .withSuccessHandler(res => {

      alert(

        "Import berhasil : "

        + res.total +

        " row"

      );

    })

    .withFailureHandler(err => {

      alert(err.message);

    })

    .uploadModuleData(

      module,

      uploadedData,

      "upload.csv",

      CURRENT_USER

    );

}



</script>
