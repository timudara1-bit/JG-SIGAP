<body>
  <?!= include('Layout.html'); ?>

  <script>
    var serverData = {};
    try {
      // Parsing data bawaan dari doGet backend
      serverData = JSON.parse('<?!= initialData ?>' || '{}');
    } catch(e) {
      serverData = { page: "login" };
    }

    // Periksa status lokal di browser
    var localToken = localStorage.getItem("JG_SIGAP_TOKEN");
    var expiryTime = localStorage.getItem("JG_SIGAP_EXPIRY");
    var isSessionValid = false;

    if (localToken && expiryTime) {
      if (Date.now() < parseInt(expiryTime, 10)) {
        isSessionValid = true; 
      } else {
        localStorage.removeItem("JG_SIGAP_TOKEN");
        localStorage.removeItem("JG_SIGAP_EXPIRY");
      }
    }

    // Jika user punya sesi valid, paksa halaman mengarah ke dashboard, bukan login
    if (isSessionValid) {
      serverData.page = "dashboard";
      serverData.token = localToken;
    }

    window.INITIAL_DATA = serverData;
    window.APP_INITIAL_DATA = serverData;
    window.APP_CONFIG = JSON.parse('<?!= appConfig ?>' || '{}');
  </script>
