<div class="register-box">

  <img
    src="https://drive.google.com/thumbnail?id=1khiHehuJxwrcC_6LE__O9yXvBV6Hx_O6"
    class="logo">

  <h2>Registrasi User</h2>

  <input
    type="text"
    id="nama"
    placeholder="Nama Lengkap">

  <input
    type="email"
    id="email"
    placeholder="Email">

  <input
    type="password"
    id="password"
    placeholder="Password">

  <input
    type="password"
    id="confirmPassword"
    placeholder="Konfirmasi Password">

  <button onclick="register()">
    Daftar
  </button>

  <div id="message"></div>

</div>
