function showDetail(filter){

  const modal =
    document.getElementById(
      "detailModal"
    );

  if(modal){
    modal.style.display = "block";
  }

  google.script.run
    .withSuccessHandler(
      renderDetail
    )
    .withFailureHandler(function(err){

      alert(
        err.message
      );

    })
    .getDetailFPB(filter);

}

function renderDetail(data){

  let html = `
    <table class="table">
      <thead>
        <tr>
          <th>No FPB</th>
          <th>Tanggal</th>
          <th>Pemohon</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody>
  `;

  data.forEach(row => {

    html += `
      <tr>
        <td>${row.no}</td>
        <td>${row.tanggal}</td>
        <td>${row.pemohon}</td>
        <td>${row.status}</td>
      </tr>
    `;

  });

  html += `
      </tbody>
    </table>
  `;

  const container =
    document.getElementById(
      "detailContainer"
    );

  if(container){
    container.innerHTML = html;
  }

}

function logout(){

    text: "Anda yakin ingin keluar?",
    icon: "question",

    showCancelButton: true,

    confirmButtonText: "Ya",
    cancelButtonText: "Batal"

  }).then((result)=>{

    if(result.isConfirmed){

      google.script.run

        .logoutUser();

  });

}

function setValue(id,value){

  const el =
    document.getElementById(id);

  if(el){

    el.innerText =
      value ?? 0;

  }

}

function loadSLADashboard() {

  google.script.run
    .withSuccessHandler(renderSLADashboard)
    .withFailureHandler(err => {
      console.error("SLA LOAD ERROR:", err);
    })
    .getSLADashboardData();

}

function renderSLADashboard(data){

  const mapping = {

    CREATE_FPB : "Fpb",
    VERIFY_GA : "Ga",
    APPROVE_FAT : "Fa",
    APPROVE_IA : "Ia",

    CREATE_PP : "Pp",
    CREATE_PR : "Pr",

    RECEIVE : "Receive",
    INVOICE : "Invoice",
    PAYMENT : "Payment"

  };

  console.log("RAW SLA DATA:", data);

  data.forEach(row => {

    const code = mapping[row.process_code];

    if(!code){
      console.log(
        "STEP TIDAK ADA MAPPING:",
        row.process_code
      );
      return;
    }

    const targetEl =
      document.getElementById(
        "sla" + code + "Target"
      );

    const actualEl =
      document.getElementById(
        "sla" + code + "Actual"
      );

    const statusEl =
      document.getElementById(
        "sla" + code + "Status"
      );

    console.log({
      process: row.process_code,
      code,
      targetId: "sla" + code + "Target",
      targetEl,
      actualEl,
      statusEl
    });

    if(targetEl)
      targetEl.innerText =
        row.target || 0;

    if(actualEl)
      actualEl.innerText =
        Number(row.actual || 0).toFixed(1);

    if(statusEl){

      const compliance =
        row.sla_compliance_percent || 0;

      if(compliance >= 90){

        statusEl.innerText = "GOOD";
        statusEl.style.color = "green";

      }else if(compliance >= 70){

        statusEl.innerText = "WARNING";
        statusEl.style.color = "orange";

      }else{

        statusEl.innerText = "BREACH";
        statusEl.style.color = "red";

      }

    }

  });

}

function loadSLAHeatmap() {

//HEATMAP RENDER UI
function renderSLAHeatmap(data) {

  const container = document.getElementById("slaHeatmap");

  if (!container) return;

  let html = "";

  data.forEach(r => {

    let color = "";

    if (r.status === "GREEN") color = "#2ecc71";
    if (r.status === "YELLOW") color = "#f1c40f";
    if (r.status === "RED") color = "#e74c3c";

    html += `
      <div style="
        padding:10px;
        margin:5px;
        border-radius:8px;
        background:${color};
        color:white;
        display:inline-block;
        min-width:160px;
      ">
        <b>${r.process_code} - ${r.step_code}</b><br>
        SLA: ${r.sla_hours}h<br>
        ACT: ${r.actual_hours?.toFixed(1) || '-'}h
      </div>
    `;
  });

  container.innerHTML = html;
}

//BOTTLENECK RENDER UI
function renderBottleneck(data) {

  const container = document.getElementById("bottleneckTable");

  if (!container) return;

  let html = `
    <table class="table">
      <thead>
        <tr>
          <th>Step</th>
          <th>Total</th>
          <th>Delay</th>
          <th>Delay %</th>
          <th>Severity</th>
        </tr>
      </thead>
      <tbody>
  `;

  data.forEach(r => {

    let color = "";

    if (r.severity === "CRITICAL") color = "red";
    else if (r.severity === "HIGH") color = "orange";
    else if (r.severity === "MEDIUM") color = "yellow";
    else color = "green";

    html += `
      <tr style="color:${color}">
        <td>${r.step_code}</td>
        <td>${r.total}</td>
        <td>${r.delay}</td>
        <td>${r.delay_ratio.toFixed(1)}%</td>
        <td><b>${r.severity}</b></td>
      </tr>
    `;
  });

  html += `</tbody></table>`;

  container.innerHTML = html;
}

  }
});


function displayInitialData(dataObject) {
  // Pastikan data yang masuk berupa objek valid (bukan null/array kosong)
  if (!dataObject || typeof dataObject !== 'object' || Array.isArray(dataObject)) return;

  // Struktur pemetaan dari nama step database ke prefix ID elemen HTML Anda
  const LOCAL_STEP_MAPPING = {
    'CREATE_FPB': 'Fpb',
    'VERIFY_GA': 'Ga',
    'APPROVE_FAT': 'Fa',
    'APPROVE_IA': 'Ia',
    'CREATE_PP': 'Pp',
    'CREATE_PR': 'Pr',
    'RECEIVE': 'Receive',
    'INVOICE': 'Invoice',
    'PAYMENT': 'Payment'
  };

  // Lakukan looping berdasarkan key step yang ada di dalam dataObject (misal: 'CREATE_FPB')
  Object.keys(dataObject).forEach(function(stepName) {
    const stepData = dataObject[stepName]; // Mengambil properti seperti avgDuration, performance
    const prefix = LOCAL_STEP_MAPPING[stepName];

    if (prefix) {
      const targetId = 'sla' + prefix + 'Target';
      const actualId = 'sla' + prefix + 'Actual';
      const statusId = 'sla' + prefix + 'Status';

      // 1. Set Target Value (Karena di fungsi Anda tidak ada kolom target khusus, kita berikan default atau sesuaikan)
      const targetEl = document.getElementById(targetId);
      if (targetEl) {
        // Jika Anda memiliki data target, silakan ganti, jika tidak ini mengambil dari total data yang diproses
        targetEl.textContent = stepData.total !== undefined ? stepData.total + ' Data' : '-';
      }

      // 2. Set Actual Value (Diambil dari properti avgDuration hasil perhitungan fungsi Anda)
      const actualEl = document.getElementById(actualId);
      if (actualEl) {
        actualEl.textContent = stepData.avgDuration !== undefined ? Number(stepData.avgDuration).toFixed(1) + ' Jam' : '0';
      }

      // 3. Set Status / Compliance % Value (Diambil dari properti performance hasil perhitungan fungsi Anda)
      const statusEl = document.getElementById(statusId);
      if (statusEl) {
        statusEl.textContent = stepData.performance !== undefined ? Number(stepData.performance).toFixed(0) + '%' : '-';
        
        // Bonus: Mengubah warna status berdasarkan hasil kalkulasi fungsi Anda ("GOOD", "WARNING", "BREACH")
        if (stepData.status === "GOOD") statusEl.style.color = "#28a745";
        else if (stepData.status === "WARNING") statusEl.style.color = "#ffc107";
        else if (stepData.status === "BREACH") statusEl.style.color = "#dc3545";
      }
    }
  });
}
