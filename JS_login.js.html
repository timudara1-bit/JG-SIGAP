<script>
function login() {

  const emailInput = document.getElementById("email") || document.getElementById("username");
  const passwordInput = document.getElementById("password");
  const loginBox = document.getElementById("loginBox") || document.querySelector(".login-box");
  const loginButton = document.getElementById("loginButton") || document.querySelector("button[onclick='login()']");
  const buttonLoader = document.getElementById("buttonLoader") || document.querySelector(".button-loader");

  const email = emailInput ? emailInput.value.trim() : "";
  const password = passwordInput ? passwordInput.value : "";

  if (!email || !password) {
    alert("Email/username dan password wajib diisi");
    return;
  }

  setLoginLoading(true);

  google.script.run
    .withSuccessHandler(function(res) {
      console.log("LOGIN RESPONSE", res);

      if (!res) {
        alert("Login gagal: server tidak mengembalikan response.");
        setLoginLoading(false);
        return;
      }

      if (!res.success) {
        alert(res.message || "Login gagal.");
        setLoginLoading(false);
        return;
      }

      if (!res.token) {
        alert("Login berhasil, tetapi token session tidak diterima. Hubungi administrator.");
        setLoginLoading(false);
        return;
      }

      AppCore.saveSession(res);

      const targetPage = res.redirectPage || AppCore.config.defaultPage || "dashboard";
      AppCore.redirectWithToken(targetPage, res.token);
    })
    .withFailureHandler(function(err) {
      console.error("LOGIN FAILURE", err);
      setLoginLoading(false);
      alert((err && err.message) ? err.message : err);
    })
    .loginUser(email, password, navigator.userAgent || "WEB_BROWSER");

  function setLoginLoading(isLoading) {
    if (loginBox) loginBox.classList.toggle("loading", !!isLoading);
    if (loginButton) loginButton.disabled = !!isLoading;
    if (buttonLoader) buttonLoader.classList.toggle("active", !!isLoading);
  }
}
</script>
