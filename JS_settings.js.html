// Helper interaksi perpindahan antar tab menu settings
function switchSettingsTab(evt, tabId) {
  const tabcontents = document.getElementsByClassName("tab-content");
  for (let i = 0; i < tabcontents.length; i++) {
    tabcontents[i].classList.remove("active");
  }
  const tablinks = document.getElementsByClassName("tab-btn");
  for (let i = 0; i < tablinks.length; i++) {
    tablinks[i].classList.remove("active");
  }
  document.getElementById(tabId).classList.add("active");
  evt.currentTarget.classList.add("active");
}

// Dummy placeholder trigger untuk modal aksi CRUD (Dapat Anda hubungkan ke google.script.run untuk simpan ke Spreadsheet)
function openSettingsModal(type, action, id) {
  const label = action === 'add' ? 'Tambah' : 'Edit';
  const target = type.toUpperCase();
  const inputPrompt = prompt(`[MOCKUP MODAL] Masukkan data baru untuk ${label} ${target} (ID: ${id || 'Baru'}):`);
  if(inputPrompt) {
    alert(`Data ${target} berhasil diproses! Silakan hubungkan fungsi ini dengan google.script.run untuk menulis ke database Spreadsheet.`);
  }
}

function deleteSettingsItem(type, id) {
  if (confirm(`Apakah Anda yakin ingin menghapus data ${type} dengan ID: ${id}?`)) {
    alert(`Data ${id} berhasil dihapus dari sistem mockup.`);
  }
}

</script>
